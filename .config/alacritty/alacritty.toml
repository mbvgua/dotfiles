[general]
import = ["~/.config/alacritty/monokai.toml"]

[env]
# merges well with tmux
TERM = "xterm-256color"

[window]
# not very useful in a window manager
decorations = "buttonless"
dynamic_padding = false

[window.padding]
x = 2
y = 2

[font]
size = 14

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

# NOTE: fallsback to normal font specified,
# else font rendering will be weird

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[colors]
draw_bold_text_with_bright_colors = true

[bell]
animation = "Linear"
duration = 3
