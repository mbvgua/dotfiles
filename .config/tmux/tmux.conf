# unbind default prefix key and set to C-a
unbind-key C-b
set-option -g prefix C-a

# bind "C-a C-a" to send "C-a" to terminal
bind-key C-a send-prefix

# Add binding to reload tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# tell tmux to start ineteractive shell
set -g default-shell /bin/bash
set -g default-command /bin/bash

# FIXME: not working?
# hide the status line when in neovim
set-hook -g after-select-pane 'if -F "#{==:#{pane_current_command},nvim}" "set status off" "set status on"'
set-hook -g pane-focus-in 'if -F "#{==:#{pane_current_command},nvim}" "set status off" "set status on"'
set-hook -g window-pane-changed 'if -F "#{==:#{pane_current_command},nvim}" "set status off" "set status on"'

# remove zero-based indexing in tabs & panes numbering
set-option -g base-index 1
set-option -g pane-base-index 1

# rename window to reflect current program
set-option -g -w automatic-rename on

# renumber windows when one is closed
set-option -g renumber-windows on

# vi mode keys for copy mode
# prefix+[ to start copy mode
# prefix+] to paste in tmux
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# retain path when opening new windows
bind c "new-window -c'#{pane_current_path}'"

# split panes with | and - . also removes trouble of hitting shift to use | by
# work with both the uppercase and lowercase version of the key
# also retain the current path when making new window
unbind '"'
unbind %
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"

# navigating between panes in a window with h,j,k,l -> like vim!!
# navigate panes easily with C-a+n/p -> like vim!
unbind h
unbind j
unbind k
unbind l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes; Ctrl-h/j/k/l
bind-key -n C-h resize-pane -L 2
bind-key -n C-j resize-pane -D 1
bind-key -n C-k resize-pane -U 1
bind-key -n C-l resize-pane -R 2

# kill a window with multiple panes
bind-key q kill-window

# increase session history
set-option -g history-limit 50000

# enable mouse controll(clickable windows, panes, resizable panes)
set -g mouse on

# server options: wait time afetr pressing <esc>
set-option -s escape-time 0

# status bar styling
BACKGROUND="#272822"; BACKGROUND_ALT="#383830"; FOREGROUND="#f8f8f2"
RED="#f92672"; GREEN="#a6e22e"; YELLOW="#f4bf75"; BLUE="#66d9ef"; MAGENTA="#ae81ff"; CYAN="#78dce8"

set-option -g status-style fg=${FOREGROUND},bg=${BACKGROUND_ALT}
setw -g window-status-current-style fg=${BACKGROUND},bg=${CYAN}
setw -g window-status-current-format ' #I:#W#F '

set-option -g status-justify absolute-centre

# %I:%M%P -> time in 12hr format. removed. can alreadysee it on system!
# %j-> day of year as a decimal
set-option -g status-right "'#H' 󱛡 %j "
